# Infisical Docker Sync + recreate-proxy
#
# Шаг 1: cp docker-compose.example.yml docker-compose.yml
# Шаг 2: создайте .env — PROXY_TOKEN (openssl rand -hex 32), DOCKER_GID (stat -c '%g' /var/run/docker.sock)
# Шаг 3: mkdir -p data && docker compose up -d
# Шаг 4: отредактируйте data/config.yaml (создастся из примера при первом старте)
# Шаг 5: замените volume ниже на каталоги ваших приложений (где лежит .env)

services:
  recreate-proxy:
    image: ghcr.io/webzaytsev/infisical-docker-sync:latest
    container_name: recreate-proxy
    command: proxy
    restart: unless-stopped
    environment:
      - PROXY_TOKEN=${PROXY_TOKEN}
      - CONTAINER_NAME=recreate-proxy
      # Для приватного registry: auth config используется только сервисами с pullImage: true в config.yaml.
      # - DOCKER_AUTH_CONFIG_FILE=/run/docker-auth/config.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker config с auths для приватного registry; файл должен читаться uid/gid 65532.
      # - ${HOME}/.credentials/infisical-docker-sync/config.json:/run/docker-auth/config.json:ro
    group_add:
      - "${DOCKER_GID:-999}"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    networks: [proxynet]

  infisical-docker-sync:
    image: ghcr.io/webzaytsev/infisical-docker-sync:latest
    container_name: infisical-docker-sync
    restart: unless-stopped
    user: "0:0"   # нужен для записи .env после chown в entrypoint приложения
    environment:
      - PROXY_URL=http://recreate-proxy:8080
      - PROXY_TOKEN=${PROXY_TOKEN}
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
      - ${HOME}/projects/my-app:/projects/my-app
      - ${HOME}/projects/my-worker:/projects/my-worker
    depends_on: [recreate-proxy]
    networks:
      - proxynet   # связь с proxy
      - default    # HTTPS к Infisical

networks:
  proxynet:
    internal: true
