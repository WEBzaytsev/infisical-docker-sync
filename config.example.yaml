# Infisical Docker Sync — пример config.yaml
#
# Путь в контейнере: /app/data/config.yaml
# При первом запуске агент скопирует этот файл, если config.yaml ещё нет.
#
# Порядок настройки:
#   1. Заполните siteUrl, clientId, clientSecret (Machine Identity в Infisical)
#   2. Для каждого приложения добавьте блок в services
#   3. container = container_name в compose приложения
#   4. envDir = mount point в compose агента (см. docker-compose.example.yml)
#   5. envFileName = имя файла, обычно .env
#   6. envFileOwner = опциональный uid:gid для atomic rewrite (например 80:80 для Laravel/php-fpm)
#
# siteUrl должен быть https://...; http://... разрешён только для локального Infisical
# (localhost, 127.0.0.1, ::1).

siteUrl: https://app.infisical.com
clientId: your-client-id
clientSecret: your-client-secret
syncInterval: 60       # секунды, минимум 10
logLevel: info         # info: только изменения/ошибки; debug: каждая проверка; silent: без логов

services:
  - container: my-backend
    projectId: your-project-id
    environment: dev
    # secretPath: /applications/my-backend  # папка Infisical; по умолчанию корень /
    envDir: /app/data/envs
    envFileName: .env
    # envFileOwner: "80:80"  # опционально: сохранить owner файла для Laravel/php-fpm
    # pullImage: true  # перед пересозданием скачать свежий образ для этого контейнера
    # syncInterval: 120  # свой интервал для этого сервиса
    # overrides:         # другие credentials для отдельного проекта
    #   siteUrl: https://custom.infisical.com
    #   clientId: other-client-id
    #   clientSecret: other-client-secret
